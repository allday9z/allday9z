<svg width="380" height="260" viewBox="0 0 380 260" xmlns="http://www.w3.org/2000/svg" font-family="'Comic Sans MS', 'Segoe Print', cursive, sans-serif">
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g transform="rotate(-3 190 130)" filter="url(#soft-shadow)">
    <rect x="30" y="20" width="320" height="220" rx="6" fill="#ffe066"/>
    <rect x="30" y="20" width="320" height="220" rx="6" fill="#000000" opacity="0.03"/>

    <g transform="translate(150 6) rotate(-8)">
      <rect x="0" y="0" width="80" height="26" fill="#d9d9d9" opacity="0.85"/>
    </g>

    <text x="190" y="65" font-size="20" text-anchor="middle" fill="#2b2b2b" font-weight="bold">Did you know? 🤔</text>

    <text x="55" y="105" font-size="15" fill="#2b2b2b">I test in production...</text>
    <text x="55" y="128" font-size="15" fill="#2b2b2b">carefully, with a rollback</text>
    <text x="55" y="151" font-size="15" fill="#2b2b2b">plan warmed up and a</text>
    <text x="55" y="174" font-size="15" fill="#2b2b2b">Telegram bot ready to</text>
    <text x="55" y="197" font-size="15" fill="#2b2b2b">rat me out if it breaks 🚨</text>

    <text x="190" y="228" font-size="13" text-anchor="middle" fill="#555">— sticky note, self-verified</text>
  </g>
</svg>
